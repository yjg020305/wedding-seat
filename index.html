<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>婚礼座位查询</title>
<style>
:root{--red:#991b1b;--gold:#d9a441;--brown:#7c2d12}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:linear-gradient(150deg,#b91c1c 0%,#b91c1c 32%,#fff7ed 32.2%,#fff7ed 100%);color:#3b1d1d}
.wrap{max-width:720px;margin:0 auto;padding:28px 18px 48px}
.card{background:rgba(255,255,255,.95);border:1px solid rgba(217,164,65,.55);border-radius:24px;padding:26px 22px;box-shadow:0 18px 50px rgba(80,10,10,.2)}
h1{text-align:center;color:var(--red);margin:6px 0 8px;font-size:34px;letter-spacing:2px}
.sub{text-align:center;color:#7c2d12;margin:0 0 18px;font-size:18px}
.version{text-align:center;color:#9a3412;font-size:13px;margin-bottom:22px}
label{display:block;font-weight:800;margin:14px 0 8px;font-size:18px}
input{width:100%;padding:16px 18px;border-radius:16px;border:1px solid #e7c274;font-size:20px;background:white;outline:none}
button{width:100%;border:0;border-radius:18px;background:linear-gradient(90deg,#991b1b,#dc2626);color:white;font-size:22px;font-weight:900;padding:16px;margin-top:22px;cursor:pointer}
.result{margin-top:22px;border-radius:18px;padding:24px;text-align:center;background:#fff7ed;border:1px solid #f0c36d;display:none;font-size:20px}
.tableNo{font-size:46px;color:#991b1b;font-weight:900;margin:18px 0;line-height:1.25;letter-spacing:1px}
.bad{background:#fef2f2;border-color:#fecaca;color:#991b1b}
.ok{background:#f0fdf4;border-color:#bbf7d0;color:#166534}
.multi{background:#fff7ed;border-color:#f0c36d;color:#7c2d12;text-align:left}
.multi h3{text-align:center;margin:0 0 14px;color:#991b1b}
.result-list{display:flex;flex-direction:column;gap:10px}
.result-item{display:flex;justify-content:space-between;align-items:center;border:1px solid #f0c36d;background:white;border-radius:14px;padding:14px 16px}
.result-name{font-weight:800;font-size:20px;color:#3b1d1d}
.result-table{font-weight:900;font-size:22px;color:#991b1b;text-align:right}
.result-note{font-size:13px;color:#9a3412;margin-top:4px}
.footer{text-align:center;margin-top:18px;color:rgba(255,255,255,.9);font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>婚礼座位查询</h1>
    <p class="sub">欢迎参加我们的婚礼 · 请输入姓名查询桌号</p>
    <div id="version" class="version">正在读取名单更新时间……</div>
    <label for="name">姓名</label>
    <input id="name" type="text" placeholder="例如：张三" autocomplete="name">
    <button onclick="querySeat()">查询桌号</button>
    <div id="result" class="result"></div>
  </div>
  <div class="footer">如查询不到，请联系签到台工作人员。</div>
</div>
<script>
let guests = [];
const owner = 'yjg020305';
const repo = 'wedding-seat';
const csvFile = 'guests.csv';

function parseCSV(text){
  text = text.replace(/^\uFEFF/, '');
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i], next=text[i+1];
    if(ch==='"' && q && next==='"'){cur+='"';i++}
    else if(ch==='"'){q=!q}
    else if((ch===',' || ch==='，') && !q){row.push(cur.trim());cur=''}
    else if((ch==='\n'||ch==='\r') && !q){
      if(cur!=='' || row.length){row.push(cur.trim());rows.push(row);row=[];cur=''}
      if(ch==='\r' && next==='\n') i++;
    } else cur+=ch;
  }
  if(cur!=='' || row.length){row.push(cur.trim());rows.push(row)}
  return rows.filter(r=>r.some(x=>x));
}
function normalizeHeader(s){return (s||'').replace(/\s/g,'').toLowerCase()}
function importRows(rows){
  const header=rows[0].map(normalizeHeader);
  const nameIdx=header.findIndex(h=>h.includes('姓名')||h.includes('宾客')||h==='name');
  const tableIdx=header.findIndex(h=>h.includes('桌号')||h.includes('桌名')||h.includes('桌')||h==='table');
  const noteIdx=header.findIndex(h=>h.includes('备注')||h==='note');
  if(nameIdx<0 || tableIdx<0) throw new Error('guests.csv 表头必须包含“姓名”和“桌名/桌号”两列');
  guests = rows.slice(1).map(r=>({
    name:(r[nameIdx]||'').trim(),
    table:(r[tableIdx]||'').trim(),
    note: noteIdx>=0 ? (r[noteIdx]||'').trim() : ''
  })).filter(g=>g.name && g.table);
}
function formatChinaTime(iso){
  const d = new Date(iso);
  if(isNaN(d)) return '';
  return d.toLocaleString('zh-CN',{timeZone:'Asia/Shanghai',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).replace(/\//g,'-');
}
async function loadUpdateTime(){
  const version = document.getElementById('version');
  try{
    const api = `https://api.github.com/repos/${owner}/${repo}/commits?path=${encodeURIComponent(csvFile)}&per_page=1`;
    const res = await fetch(api, {cache:'no-store'});
    if(!res.ok) throw new Error('GitHub API 读取失败');
    const data = await res.json();
    const iso = data && data[0] && data[0].commit && data[0].commit.committer && data[0].commit.committer.date;
    version.textContent = iso ? '名单更新于：' + formatChinaTime(iso) : '名单已加载';
  }catch(e){ version.textContent = '名单已加载'; }
}
async function loadGuests(){
  const version = document.getElementById('version');
  try{
    const res = await fetch(csvFile + '?time=' + Date.now(), {cache:'no-store'});
    if(!res.ok) throw new Error('未找到 guests.csv');
    const text = await res.text();
    importRows(parseCSV(text));
  }catch(err){ version.textContent = '名单读取失败，请联系签到台工作人员。'; }
}
function querySeat(){
  const name=document.getElementById('name').value.trim();
  const box=document.getElementById('result');
  box.style.display='block';
  box.className='result';
  if(!guests.length){box.classList.add('bad');box.innerHTML='宾客名单尚未读取成功，请联系签到台工作人员。';return}
  if(!name){box.classList.add('bad');box.innerHTML='请输入姓名';return}
  const exact = guests.filter(g=>g.name === name);
  let matches = exact.length ? exact : guests.filter(g=>g.name.includes(name) || name.includes(g.name));
  if(matches.length===0){
    box.classList.add('bad');
    box.innerHTML='未查询到该姓名，请确认姓名是否与邀请名单一致，或联系签到台工作人员。';
  }else if(matches.length===1){
    const g=matches[0];
    box.classList.add('ok');
    box.innerHTML=`<div>欢迎您，<b>${escapeHTML(g.name)}</b></div><div class="tableNo">✿ ${escapeHTML(g.table)} ✿</div>${g.note?`<div>${escapeHTML(g.note)}</div>`:''}<div style="font-size:16px;margin-top:8px;">祝您用餐愉快</div>`;
  }else{
    box.classList.add('multi');
    const list = matches.map(g=>`<div class="result-item"><div><div class="result-name">${escapeHTML(g.name)}</div>${g.note?`<div class="result-note">${escapeHTML(g.note)}</div>`:''}</div><div class="result-table">${escapeHTML(g.table)}</div></div>`).join('');
    box.innerHTML=`<h3>查询到 ${matches.length} 位宾客</h3><div class="result-list">${list}</div>`;
  }
}
function escapeHTML(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
document.getElementById('name').addEventListener('keydown', function(e){ if(e.key === 'Enter') querySeat(); });
loadGuests();
loadUpdateTime();
</script>
</body>
</html>
