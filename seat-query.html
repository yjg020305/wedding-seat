<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>婚礼座位查询</title>
<style>
:root{--red:#8f1d1d;--gold:#d9a441;--bg:#fff7ed}
*{box-sizing:border-box}
body{
  margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
  background: radial-gradient(circle at 30% 10%, #fff2c9 0, transparent 26%),
              linear-gradient(160deg,#7f1d1d,#b91c1c 45%,#fff7ed 45.2%,#fff7ed);
  color:#3b1d1d;
}
.wrap{max-width:760px;margin:0 auto;padding:28px 18px 48px}
.card{
  background:rgba(255,255,255,.94);border:1px solid rgba(217,164,65,.45);
  border-radius:24px;padding:24px;box-shadow:0 18px 50px rgba(80,10,10,.22)
}
h1{text-align:center;color:var(--red);margin:4px 0 6px;font-size:30px}
.sub{text-align:center;color:#7c2d12;margin:0 0 24px}
.upload{border:1px dashed #d9a441;border-radius:18px;padding:16px;background:#fffbeb;margin-bottom:18px}
label{display:block;font-weight:700;margin:12px 0 6px}
input[type="text"],input[type="file"]{
  width:100%;padding:14px 16px;border-radius:14px;border:1px solid #e7c274;font-size:18px;background:white
}
button{
  width:100%;border:0;border-radius:16px;background:linear-gradient(90deg,#991b1b,#dc2626);
  color:white;font-size:19px;font-weight:800;padding:14px 16px;margin-top:14px;cursor:pointer
}
button.secondary{background:#7c2d12}
.result{
  margin-top:18px;border-radius:18px;padding:20px;text-align:center;background:#fff7ed;border:1px solid #f0c36d;
  display:none
}
.tableNo{font-size:42px;color:#991b1b;font-weight:900;margin:8px 0}
.small{font-size:13px;color:#7c2d12;line-height:1.7}
.bad{background:#fef2f2;border-color:#fecaca;color:#991b1b}
.ok{background:#f0fdf4;border-color:#bbf7d0;color:#166534}
.footer{text-align:center;margin-top:20px;color:#fff7ed;font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>婚礼座位查询</h1>
    <p class="sub">欢迎参加我们的婚礼 · 请输入姓名查询桌号</p>

    <div class="upload">
      <b>管理员导入名单</b>
      <p class="small">请先用 Excel 填写模板，然后“另存为 CSV UTF-8”。现场电脑/手机打开本页后导入 CSV，即可查询。CSV表头需包含：姓名、桌号；手机号后四位可选。</p>
      <input id="file" type="file" accept=".csv,text/csv">
      <button class="secondary" onclick="loadDemo()">载入示例名单</button>
      <p id="loadStatus" class="small">尚未导入名单</p>
    </div>

    <label for="name">姓名</label>
    <input id="name" type="text" placeholder="例如：张三">

    <label for="phone">手机号后四位（重名时填写）</label>
    <input id="phone" type="text" placeholder="可不填">

    <button onclick="querySeat()">查询桌号</button>

    <div id="result" class="result"></div>
  </div>
  <div class="footer">建议把本网页部署到 GitHub Pages / 腾讯云静态网站，再把网址生成二维码。</div>
</div>

<script>
let guests = [];

function parseCSV(text){
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i], next=text[i+1];
    if(ch==='"' && q && next==='"'){cur+='"';i++}
    else if(ch==='"'){q=!q}
    else if(ch===',' && !q){row.push(cur.trim());cur=''}
    else if((ch==='\n'||ch==='\r') && !q){
      if(cur!=='' || row.length){row.push(cur.trim());rows.push(row);row=[];cur=''}
      if(ch==='\r' && next==='\n') i++;
    } else cur+=ch;
  }
  if(cur!=='' || row.length){row.push(cur.trim());rows.push(row)}
  return rows.filter(r=>r.some(x=>x));
}

function normalizeHeader(s){return (s||'').replace(/\s/g,'').toLowerCase()}

function importRows(rows){
  const header=rows[0].map(normalizeHeader);
  const nameIdx=header.findIndex(h=>h.includes('姓名')||h==='name');
  const phoneIdx=header.findIndex(h=>h.includes('手机')||h.includes('后四位')||h.includes('phone'));
  const tableIdx=header.findIndex(h=>h.includes('桌号')||h.includes('桌')||h==='table');
  const noteIdx=header.findIndex(h=>h.includes('备注')||h==='note');
  if(nameIdx<0 || tableIdx<0) throw new Error('CSV表头必须包含“姓名”和“桌号”两列');
  guests = rows.slice(1).map(r=>({
    name:(r[nameIdx]||'').trim(),
    phone: phoneIdx>=0 ? (r[phoneIdx]||'').trim() : '',
    table:(r[tableIdx]||'').trim(),
    note: noteIdx>=0 ? (r[noteIdx]||'').trim() : ''
  })).filter(g=>g.name && g.table);
  document.getElementById('loadStatus').textContent = `已导入 ${guests.length} 位宾客`;
}

document.getElementById('file').addEventListener('change', async (e)=>{
  const f=e.target.files[0]; if(!f) return;
  try{
    const text=await f.text();
    importRows(parseCSV(text));
  }catch(err){ alert(err.message); }
});

function loadDemo(){
  guests=[
    {name:'张三',phone:'1234',table:'1',note:'男方朋友'},
    {name:'李四',phone:'',table:'5',note:''},
    {name:'王五',phone:'8888',table:'12',note:'女方同学'},
    {name:'张三',phone:'5678',table:'18',note:'同名示例'}
  ];
  document.getElementById('loadStatus').textContent = `已载入示例 ${guests.length} 位宾客`;
}

function querySeat(){
  const name=document.getElementById('name').value.trim();
  const phone=document.getElementById('phone').value.trim();
  const box=document.getElementById('result');
  box.style.display='block';
  box.className='result';
  if(!guests.length){box.classList.add('bad');box.innerHTML='请先导入宾客名单 CSV';return}
  if(!name){box.classList.add('bad');box.innerHTML='请输入姓名';return}
  let matches=guests.filter(g=>g.name===name || g.name.includes(name) || name.includes(g.name));
  if(matches.length>1 && phone) matches=matches.filter(g=>g.phone===phone);
  if(matches.length===0){
    box.classList.add('bad');
    box.innerHTML='未查询到该姓名，请确认姓名是否与邀请名单一致，或联系签到台工作人员。';
  }else if(matches.length>1){
    box.classList.add('bad');
    box.innerHTML='查询到重名宾客，请输入手机号后四位后再次查询。';
  }else{
    const g=matches[0];
    box.classList.add('ok');
    box.innerHTML=`<div>欢迎您，<b>${escapeHTML(g.name)}</b></div><div class="tableNo">${escapeHTML(g.table)}号桌</div>${g.note?`<div>${escapeHTML(g.note)}</div>`:''}<div class="small">祝您用餐愉快</div>`;
  }
}
function escapeHTML(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
</script>
</body>
</html>
