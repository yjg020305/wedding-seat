<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>婚礼座位查询</title>
<style>
:root{--red:#991b1b;--gold:#d9a441;--brown:#7c2d12}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:linear-gradient(150deg,#b91c1c 0%,#b91c1c 32%,#fff7ed 32.2%,#fff7ed 100%);color:#3b1d1d}.wrap{max-width:720px;margin:0 auto;padding:28px 18px 48px}.card{background:rgba(255,255,255,.95);border:1px solid rgba(217,164,65,.55);border-radius:24px;padding:26px 22px;box-shadow:0 18px 50px rgba(80,10,10,.2)}h1{text-align:center;color:var(--red);margin:6px 0 8px;font-size:34px;letter-spacing:2px}.sub{text-align:center;color:#7c2d12;margin:0 0 28px;font-size:18px}.status{text-align:center;color:#9a3412;font-size:14px;margin-bottom:18px}label{display:block;font-weight:800;margin:14px 0 8px;font-size:18px}input{width:100%;padding:16px 18px;border-radius:16px;border:1px solid #e7c274;font-size:20px;background:white;outline:none}button{width:100%;border:0;border-radius:18px;background:linear-gradient(90deg,#991b1b,#dc2626);color:white;font-size:22px;font-weight:900;padding:16px;margin-top:22px;cursor:pointer}.result{margin-top:22px;border-radius:18px;padding:24px;text-align:center;background:#fff7ed;border:1px solid #f0c36d;display:none;font-size:20px}.tableNo{font-size:52px;color:#991b1b;font-weight:900;margin:10px 0}.bad{background:#fef2f2;border-color:#fecaca;color:#991b1b}.ok{background:#f0fdf4;border-color:#bbf7d0;color:#166534}.footer{text-align:center;margin-top:18px;color:rgba(255,255,255,.9);font-size:13px}
</style>
</head>
<body>
<div class="wrap"><div class="card"><h1>婚礼座位查询</h1><p class="sub">欢迎参加我们的婚礼 · 请输入姓名查询桌号</p><div id="status" class="status">正在读取宾客名单……</div><label for="name">姓名</label><input id="name" type="text" placeholder="例如：张三" autocomplete="name"><label for="phone">手机号后四位（重名时填写）</label><input id="phone" type="text" placeholder="可不填" inputmode="numeric" maxlength="4"><button onclick="querySeat()">查询桌号</button><div id="result" class="result"></div></div><div class="footer">如查询不到，请联系签到台工作人员。</div></div>
<script>
let guests=[];
function parseCSV(text){text=text.replace(/^\uFEFF/,'');const rows=[];let row=[],cur='',q=false;for(let i=0;i<text.length;i++){const ch=text[i],next=text[i+1];if(ch==='"'&&q&&next==='"'){cur+='"';i++}else if(ch==='"'){q=!q}else if((ch===','||ch==='，')&&!q){row.push(cur.trim());cur=''}else if((ch==='\n'||ch==='\r')&&!q){if(cur!==''||row.length){row.push(cur.trim());rows.push(row);row=[];cur=''}if(ch==='\r'&&next==='\n')i++}else cur+=ch}if(cur!==''||row.length){row.push(cur.trim());rows.push(row)}return rows.filter(r=>r.some(x=>x))}
function normalizeHeader(s){return(s||'').replace(/\s/g,'').toLowerCase()}
function importRows(rows){const header=rows[0].map(normalizeHeader);const nameIdx=header.findIndex(h=>h.includes('姓名')||h.includes('宾客')||h==='name');const phoneIdx=header.findIndex(h=>h.includes('手机')||h.includes('后四位')||h.includes('phone'));const tableIdx=header.findIndex(h=>h.includes('桌号')||h.includes('桌')||h==='table');const noteIdx=header.findIndex(h=>h.includes('备注')||h==='note');if(nameIdx<0||tableIdx<0)throw new Error('guests.csv 表头必须包含“姓名”和“桌号”两列');guests=rows.slice(1).map(r=>({name:(r[nameIdx]||'').trim(),phone:phoneIdx>=0?(r[phoneIdx]||'').trim():'',table:(r[tableIdx]||'').trim(),note:noteIdx>=0?(r[noteIdx]||'').trim():''})).filter(g=>g.name&&g.table);document.getElementById('status').textContent=`已读取 ${guests.length} 位宾客名单`}
async function loadGuests(){const status=document.getElementById('status');try{const res=await fetch('guests.csv?time='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error('未找到 guests.csv');const text=await res.text();importRows(parseCSV(text))}catch(err){status.textContent='名单读取失败：请确认 index.html 和 guests.csv 在同一个 GitHub 仓库根目录。'}}
function querySeat(){const name=document.getElementById('name').value.trim();const phone=document.getElementById('phone').value.trim();const box=document.getElementById('result');box.style.display='block';box.className='result';if(!guests.length){box.classList.add('bad');box.innerHTML='宾客名单尚未读取成功，请联系签到台工作人员。';return}if(!name){box.classList.add('bad');box.innerHTML='请输入姓名';return}let matches=guests.filter(g=>g.name===name||g.name.includes(name)||name.includes(g.name));if(matches.length>1&&phone)matches=matches.filter(g=>g.phone===phone);if(matches.length===0){box.classList.add('bad');box.innerHTML='未查询到该姓名，请确认姓名是否与邀请名单一致，或联系签到台工作人员。'}else if(matches.length>1){box.classList.add('bad');box.innerHTML='查询到重名宾客，请输入手机号后四位后再次查询。'}else{const g=matches[0];box.classList.add('ok');box.innerHTML=`<div>欢迎您，<b>${escapeHTML(g.name)}</b></div><div class="tableNo">${escapeHTML(g.table)}号桌</div>${g.note?`<div>${escapeHTML(g.note)}</div>`:''}<div style="font-size:14px;margin-top:8px;">祝您用餐愉快</div>`}}
function escapeHTML(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
loadGuests();
</script>
</body>
</html>
